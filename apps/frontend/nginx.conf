server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    index index.html;

    set $backend_upstream http://backend:3001;
    set $signalr_hub_upstream http://signalr-hub:5000;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/linkset+json text/markdown;
    gzip_vary on;
    gzip_min_length 256;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy SignalR hub connections (negotiate + WebSocket)
    location /hubs/ {
        proxy_pass $signalr_hub_upstream;
        proxy_http_version 1.1;

        # Only set upgrade headers when client sends an Upgrade header (WebSocket)
        set $conn_header "";
        if ($http_upgrade) {
            set $conn_header "upgrade";
        }
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $conn_header;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API catalog (RFC 9727)
    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link '</.well-known/api-catalog>; rel="api-catalog"' always;
        try_files $uri =404;
    }

    # MCP Server Card
    location = /.well-known/mcp/server-card.json {
        default_type application/json;
        try_files $uri =404;
    }

    # Agent Skills discovery
    location = /.well-known/agent-skills/index.json {
        default_type application/json;
        try_files $uri =404;
    }
    location ~ ^/.well-known/agent-skills/.*\.md$ {
        default_type "text/markdown; charset=utf-8";
        try_files $uri =404;
    }

    # Serve the markdown page with correct content type
    location = /index.md {
        internal;
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Link '</.well-known/api-catalog>; rel="api-catalog", </.well-known/mcp/server-card.json>; rel="describedby", </api/health>; rel="status"' always;
        try_files $uri =404;
    }

    # Serve static files and fall back to index.html for SPA routing
    location / {
        # Link headers for agent discovery (RFC 8288 / RFC 9727)
        add_header Link '</.well-known/api-catalog>; rel="api-catalog", </.well-known/mcp/server-card.json>; rel="describedby", </api/health>; rel="status"' always;

        # Markdown for Agents — content negotiation
        if ($http_accept ~* "text/markdown") {
            rewrite ^ /index.md last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
