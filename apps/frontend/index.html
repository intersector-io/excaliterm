<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Collaborative terminal workspace with an infinite canvas. Share live terminal sessions, sticky notes, and code editors in real-time. No accounts needed.">
    <link rel="canonical" href="https://excaliterm.com/">

    <!-- Open Graph -->
    <meta property="og:title" content="Excaliterm — Collaborative Terminal Canvas">
    <meta property="og:description" content="Share live terminal sessions on an infinite canvas. Real-time collaboration with sticky notes, code editors, and screen sharing. No accounts needed.">
    <meta property="og:image" content="https://excaliterm.com/og-image.png">
    <meta property="og:url" content="https://excaliterm.com">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Excaliterm">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Excaliterm — Collaborative Terminal Canvas">
    <meta name="twitter:description" content="Share live terminal sessions on an infinite canvas. Real-time collaboration with sticky notes, code editors, and screen sharing.">
    <meta name="twitter:image" content="https://excaliterm.com/og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <title>Excaliterm — Collaborative Terminal Canvas</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Excaliterm",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "description": "Collaborative terminal workspace with an infinite canvas UI, shared notes, chat, and file access.",
      "url": "https://excaliterm.com",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="root" class="h-screen w-screen"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (navigator.modelContext) {
        const reg = (def) => navigator.modelContext.registerTool(def);
        const api = async (path, opts) => {
          const res = await fetch(`/api${path}`, opts);
          if (!res.ok) return { error: `${res.status} ${res.statusText}` };
          return res.json();
        };
        reg({
          name: "create-workspace",
          description: "Create a new collaborative terminal canvas workspace",
          inputSchema: { type: "object", properties: {}, additionalProperties: false },
          async execute() {
            const ws = await api("/workspaces", { method: "POST" });
            if (ws.error) return ws;
            return { workspaceId: ws.id, url: `${location.origin}/w/${ws.id}` };
          }
        });
        reg({
          name: "get-workspace",
          description: "Get details of an existing workspace by ID",
          inputSchema: {
            type: "object",
            properties: { workspaceId: { type: "string", description: "The workspace ID" } },
            required: ["workspaceId"],
            additionalProperties: false
          },
          async execute(params) { return api(`/workspaces/${params.workspaceId}`); }
        });
        reg({
          name: "list-terminals",
          description: "List terminal sessions in a workspace",
          inputSchema: {
            type: "object",
            properties: { workspaceId: { type: "string", description: "The workspace ID" } },
            required: ["workspaceId"],
            additionalProperties: false
          },
          async execute(params) { return api(`/w/${params.workspaceId}/terminals`); }
        });
        reg({
          name: "health-check",
          description: "Check the health status of the Excaliterm service",
          inputSchema: { type: "object", properties: {}, additionalProperties: false },
          async execute() { return api("/health"); }
        });
      }
    </script>
  </body>
</html>
